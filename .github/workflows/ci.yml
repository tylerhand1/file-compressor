name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-project:
    name: Build Project
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4.2.2

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache

      - name: Configure ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ hashFiles('**/CMakeLists.txt') }}-
            ${{ runner.os }}-ccache-

      - name: Configure CMake (Standard)
        run: |
          cmake --preset default-debug \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Check Code Formatting and Linting
        uses: cpp-linter/cpp-linter-action@v2
        id: linter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          style: 'file'
          version: '22'
          tidy-checks: ''

      - name: Fail CI if formatting is incorrect
        if: steps.linter.outputs.checks-failed != 0
        run: |
          echo "Error: Code is not formatted according to clang-format 22!"
          exit 1

      - name: Build Project (Standard)
        run: cmake --build --preset default-debug

      - name: Run Catch2 Tests (Standard)
        run: ctest --preset run-tests --test-dir out/build/default-debug

      - name: Configure CMake (ASan)
        run: |
          cmake --preset asan \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build Project (ASan)
        run: cmake --build --preset asan

      - name: Run ASan Memory & Unit Tests
        run: ctest --preset run-asan-tests-ci --test-dir out/build/asan
